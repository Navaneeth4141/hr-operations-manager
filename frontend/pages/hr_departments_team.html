<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Departments & Team - HR Operations</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/frontend/css/global.css">
  <link rel="stylesheet" href="/frontend/css/dashboard.css">
</head>
<body>
  <div class="layout-wrapper">
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">
        HR Operations
        <small>HR Panel</small>
      </div>
      <ul class="sidebar-nav">
        <li>
          <a href="/hr-dashboard">
            <span class="nav-icon">&#128196;</span> Applications
          </a>
        </li>
        <li>
          <a href="/hr-jobs">
            <span class="nav-icon">&#128188;</span> Jobs
          </a>
        </li>
        <li>
          <a href="/hr-departments-team" class="active">
            <span class="nav-icon">&#128101;</span> Departments & Team
          </a>
        </li>
        <li>
          <a href="/hr-password-requests">
            <span class="nav-icon">&#128274;</span> Password Requests
          </a>
        </li>
        <li class="sidebar-divider"></li>
        <li>
          <a href="#" onclick="logout(); return false;">
            <span class="nav-icon">&#128682;</span> Logout
          </a>
        </li>
      </ul>
    </nav>

    <div class="main-content">
      <div class="top-navbar">
        <div class="navbar-left">
          <button class="hamburger-btn" id="hamburgerBtn">&#9776;</button>
          <h1 class="page-title">Departments & Team</h1>
        </div>
        <div class="navbar-right">
          <button class="notification-bell" id="notifBell">
            &#128276;
            <span class="notification-badge" id="notifBadge" style="display:none">0</span>
          </button>
          <div class="user-info" id="userInfo"></div>
          <button class="btn-logout" id="logoutBtn">Logout</button>
        </div>
      </div>

      <div class="notification-dropdown" id="notifDropdown">
        <div class="notif-header">Notifications</div>
        <div id="notifList"></div>
      </div>

      <div class="page-content">
        <div id="alertMsg" class="alert-msg"></div>

        <div class="row">
          <!-- Manage Departments -->
          <div class="col-md-5 mb-4">
            <div class="card p-4 h-100">
              <h5 class="mb-3">&#127970; Manage Departments</h5>
              <div class="input-group mb-3">
                <input type="text" class="form-control" id="newDeptName" placeholder="New department name">
                <button class="btn btn-outline-primary" type="button" onclick="addDept()">+ Add</button>
              </div>
              <div id="deptList" style="max-height:200px; overflow-y:auto; border:1px solid #e5e7eb; border-radius:6px; padding:10px;"></div>
            </div>
          </div>

          <!-- Add New Member -->
          <div class="col-md-7 mb-4">
            <div class="card p-4 h-100">
              <h5 class="mb-3">&#10133; Add New Team Member</h5>
              <form id="createSubAccountForm">
                <div class="row g-3">
                  <div class="col-md-6">
                    <select id="subDept" class="form-control" required>
                      <option value="">-- Department --</option>
                    </select>
                  </div>
                  <div class="col-md-6">
                    <select id="subRole" class="form-control" required>
                      <option value="">-- Role --</option>
                      <option value="Manager">Manager</option>
                      <option value="Interviewer">Interviewer</option>
                    </select>
                  </div>
                  <div class="col-md-6">
                    <input type="text" class="form-control" id="subUsername" placeholder="Username" required>
                  </div>
                  <div class="col-md-6">
                    <input type="email" class="form-control" id="subEmail" placeholder="Email" required>
                  </div>
                  <div class="col-md-8">
                    <input type="password" class="form-control" id="subPassword" placeholder="Password" required>
                  </div>
                  <div class="col-md-4">
                    <button type="submit" class="btn btn-primary w-100">Add Member</button>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>

        <!-- Team Members Table -->
        <div class="section-header mt-2">
          <h2>&#128101; Current Team Members</h2>
        </div>
        <div class="table-container">
          <table class="table table-striped table-bordered mb-0">
            <thead class="table-light">
              <tr>
                <th>#</th>
                <th>Username</th>
                <th>Email</th>
                <th>Role</th>
                <th>Department</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="teamBody">
              <tr><td colspan="6" class="text-center py-3">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="/frontend/js/sidebar.js"></script>
  <script src="/frontend/js/hr.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // hr.js already calls initHRManagement which handles loadDepts (populating subDept)
      loadTeam();

      const createSubAccountForm = document.getElementById('createSubAccountForm');
      if (createSubAccountForm) {
        createSubAccountForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const role = document.getElementById('subRole').value;
          const username = document.getElementById('subUsername').value;
          const email = document.getElementById('subEmail').value;
          const department = document.getElementById('subDept').value;
          const password = document.getElementById('subPassword').value;
          const res = await apiRequest('/hr/subaccounts', {
            method: 'POST',
            body: JSON.stringify({ role, username, email, department, password })
          });
          if (res && res.ok) {
            showAlert('Team member added!', 'success');
            e.target.reset();
            loadTeam();
          } else {
            const d = await res.json();
            showAlert(d.error || 'Failed to add member', 'error');
          }
        });
      }
    });

    async function loadTeam() {
      const res = await apiRequest('/hr/subaccounts');
      if (!res || !res.ok) return;
      const members = await res.json();
      const tbody = document.getElementById('teamBody');
      if (!tbody) return;
      if (members.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center py-3 text-muted">No team members yet.</td></tr>';
        return;
      }
      tbody.innerHTML = members.map((m, i) => `
        <tr>
          <td>${i+1}</td>
          <td><strong>${m.username}</strong></td>
          <td>${m.email}</td>
          <td><span class="badge bg-${m.role === 'Manager' ? 'primary' : 'info'}">${m.role}</span></td>
          <td>${m.department || '-'}</td>
          <td><button class="btn btn-danger btn-sm" onclick="deleteMember('${m._id}')">Remove</button></td>
        </tr>
      `).join('');
    }

    async function deleteMember(id) {
      if (!confirm('Remove this team member?')) return;
      const res = await apiRequest(`/hr/subaccounts/${id}`, { method: 'DELETE' });
      if (res && res.ok) { showAlert('Member removed.', 'success'); loadTeam(); }
      else showAlert('Failed to remove member.', 'error');
    }
  </script>
</body>
</html>
