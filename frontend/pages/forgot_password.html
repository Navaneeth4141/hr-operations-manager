<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - TalentSphere</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/frontend/css/global.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .auth-container {
      background: white;
      padding: 2.5rem;
      border-radius: 12px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 500px;
    }
    .auth-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 0.5rem;
      text-align: center;
    }
    .auth-subtitle {
      color: #6b7280;
      text-align: center;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    .btn-submit {
      background-color: #2563eb;
      color: white;
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      margin-top: 1rem;
    }
    .btn-submit:hover {
      background-color: #1d4ed8;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      text-decoration: none;
      color: #4b5563;
      font-size: 0.9rem;
    }
    .back-link:hover {
      color: #2563eb;
    }
    .alert-msg {
      display: none;
      padding: 0.75rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      text-align: center;
    }
    .alert-error {
      background-color: #fee2e2;
      color: #b91c1c;
      border: 1px solid #f87171;
    }
    .alert-success {
      background-color: #d1fae5;
      color: #065f46;
      border: 1px solid #34d399;
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <h2 class="auth-title" id="pageTitle">Reset Password</h2>
    <p class="auth-subtitle" id="pageSubtitle">Verify your details to set a new password</p>

    <div id="alertBox" class="alert-msg"></div>

    <form id="forgotPasswordForm">
      
      <!-- Company Name Field (Only for Company HR) -->
      <div class="mb-3" id="companyGroup" style="display: none;">
        <label class="form-label">Company Name</label>
        <input type="text" class="form-control" id="companyName" placeholder="Enter your company name">
      </div>

      <!-- Username -->
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" class="form-control" id="username" required placeholder="Enter your username">
      </div>

      <!-- Email -->
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" id="email" required placeholder="Enter your registered email">
      </div>

      <!-- New Password -->
      <div class="mb-3">
        <label class="form-label">New Password</label>
        <input type="password" class="form-control" id="newPassword" required placeholder="Enter new password (min 6 chars)">
      </div>

      <button type="submit" class="btn-submit">Submit Request</button>
    </form>

    <a href="#" id="backToLogin" class="back-link">&larr; Back to Login</a>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const urlParams = new URLSearchParams(window.location.search);
      const role = urlParams.get('role'); // null (applicant), 'company', 'admin' (admin shouldn't be here really, but we can block it)

      const title = document.getElementById('pageTitle');
      const subtitle = document.getElementById('pageSubtitle');
      const companyGroup = document.getElementById('companyGroup');
      const companyInput = document.getElementById('companyName');
      const backLink = document.getElementById('backToLogin');

      // Set up UI based on role
      if (role === 'company') {
        title.textContent = 'Company Portal Password Reset';
        subtitle.textContent = 'Submit a request to Admin (for HR) or to your HR (for Members).';
        companyGroup.style.display = 'block';
        // Company name is only required for Company HRs requesting to Admin
        // For members, we don't strictly require companyName in the backend, but we can ask for it to be safe or leave it optional.
        companyInput.placeholder = "Enter your company name (Required for HR accounts)";
        backLink.href = '/login?role=company';
      } else if (role === 'admin') {
        title.textContent = 'Admin Password Reset';
        subtitle.textContent = 'Please contact the database administrator.';
        document.getElementById('forgotPasswordForm').style.display = 'none';
        backLink.href = '/login?role=admin';
      } else {
        title.textContent = 'Applicant Password Reset';
        subtitle.textContent = 'Verify your email to reset your password instantly.';
        backLink.href = '/login';
      }

      const form = document.getElementById('forgotPasswordForm');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const alertBox = document.getElementById('alertBox');
        alertBox.style.display = 'none';
        alertBox.className = 'alert-msg';

        const username = document.getElementById('username').value.trim();
        const email = document.getElementById('email').value.trim();
        const newPassword = document.getElementById('newPassword').value;
        const companyName = companyInput.value.trim();

        if (newPassword.length < 6) {
          showAlert('New password must be at least 6 characters.', false);
          return;
        }

        try {
          let endpoint = '';
          let payload = { username, email, newPassword };

          if (role === 'company') {
            // For company portal, we don't know immediately if they are HR or a Member.
            // We'll try the HR route first if companyName is provided, otherwise Member route.
            if (companyName) {
              endpoint = '/api/auth/forgot-password/company';
              payload.companyName = companyName;
            } else {
              endpoint = '/api/auth/forgot-password/member';
            }
          } else {
            endpoint = '/api/auth/forgot-password/applicant';
          }

          const res = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          const data = await res.json();

          // If the HR route fails because it's a Member who typed a company name, we can fallback to Member route
          if (!res.ok && role === 'company' && companyName && data.error === 'HR account not found for this company.') {
             const res2 = await fetch('/api/auth/forgot-password/member', {
               method: 'POST',
               headers: { 'Content-Type': 'application/json' },
               body: JSON.stringify({ username, email, newPassword })
             });
             const data2 = await res2.json();
             if (!res2.ok) {
               showAlert(data2.error || 'Account not found.', false);
               return;
             } else {
               showAlert(data2.message, true);
               form.reset();
               return;
             }
          }

          if (!res.ok) {
            showAlert(data.error || 'Failed to process request.', false);
            return;
          }

          showAlert(data.message, true);
          form.reset();

        } catch (err) {
          console.error('Error submitting forgot password:', err);
          showAlert('A network error occurred. Please try again.', false);
        }
      });
    });

    function showAlert(msg, isSuccess) {
      const alertBox = document.getElementById('alertBox');
      alertBox.textContent = msg;
      alertBox.className = 'alert-msg ' + (isSuccess ? 'alert-success' : 'alert-error');
      alertBox.style.display = 'block';
    }
  </script>
</body>
</html>
