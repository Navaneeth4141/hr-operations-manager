<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - TalentSphere</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/frontend/css/global.css">
  <link rel="stylesheet" href="/frontend/css/dashboard.css">
  <style>
    .profile-section { background: var(--bg-white); border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; border: 1px solid var(--border-color); }
    .profile-section h5 { font-size: 15px; font-weight: 700; color: var(--primary); border-bottom: 2px solid var(--border-color); padding-bottom: 8px; margin-bottom: 1rem; }
    .edu-card, .exp-card { background: var(--bg-main); border-radius: 6px; padding: 1rem; margin-bottom: 0.75rem; border: 1px solid var(--border-color); position: relative; }
    .remove-entry { position: absolute; top: 8px; right: 10px; background: none; border: none; color: var(--danger); font-size: 18px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="layout-wrapper">
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">
        HR Operations
        <small>Applicant Portal</small>
      </div>
      <ul class="sidebar-nav">
        <li>
          <a href="/applicant-dashboard">
            <span class="nav-icon">&#128196;</span> My Applications
          </a>
        </li>
        <li>
          <a href="/applicant-profile" class="active">
            <span class="nav-icon">&#128100;</span> My Profile
          </a>
        </li>
        <li class="sidebar-divider"></li>
        <li>
          <a href="#" onclick="logout(); return false;">
            <span class="nav-icon">&#128682;</span> Logout
          </a>
        </li>
      </ul>
    </nav>

    <div class="main-content">
      <div class="top-navbar">
        <div class="navbar-left">
          <button class="hamburger-btn" id="hamburgerBtn">&#9776;</button>
          <h1 class="page-title">My Profile</h1>
        </div>
        <div class="navbar-right">
          <button class="notification-bell" id="notifBell">
            &#128276;
            <span class="notification-badge" id="notifBadge" style="display:none">0</span>
          </button>
          <div class="user-info" id="userInfo"></div>
          <button class="btn-logout" id="logoutBtn">Logout</button>
        </div>
      </div>
      <div class="notification-dropdown" id="notifDropdown">
        <div class="notif-header">Notifications</div>
        <div id="notifList"></div>
      </div>

      <div class="page-content">
        <div id="alertMsg" class="alert-msg"></div>

        <form id="profileForm">
          <!-- Personal Information -->
          <div class="profile-section">
            <h5>&#128100; Personal Information</h5>
            <div class="row g-3">
              <div class="col-md-4">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" id="pFullName" placeholder="e.g. John Doe" required>
              </div>
              <div class="col-md-2">
                <label class="form-label">Age</label>
                <input type="number" class="form-control" id="pAge" placeholder="23" min="16" max="99">
              </div>
              <div class="col-md-3">
                <label class="form-label">Date of Birth</label>
                <input type="date" class="form-control" id="pDob">
              </div>
              <div class="col-md-3">
                <label class="form-label">Phone</label>
                <input type="tel" class="form-control" id="pPhone" placeholder="+91 98765 43210">
              </div>
              <div class="col-md-6">
                <label class="form-label">Address</label>
                <input type="text" class="form-control" id="pAddress" placeholder="Street, City, State">
              </div>
              <div class="col-md-3">
                <label class="form-label">LinkedIn</label>
                <input type="url" class="form-control" id="pLinkedin" placeholder="https://linkedin.com/in/...">
              </div>
              <div class="col-md-3">
                <label class="form-label">GitHub / Portfolio</label>
                <input type="url" class="form-control" id="pGithub" placeholder="https://github.com/...">
              </div>
              <div class="col-md-12">
                <label class="form-label">Brief Summary</label>
                <textarea class="form-control" id="pSummary" rows="3" placeholder="A short professional bio about yourself..."></textarea>
              </div>
            </div>
          </div>

          <!-- Education -->
          <div class="profile-section">
            <h5>&#127979; Education</h5>

            <!-- School -->
            <div class="mb-3">
              <div class="d-flex align-items-center justify-content-between mb-2">
                <strong style="font-size:13px; color:#4a5568;">&#127eb; School (10th / Secondary)</strong>
                <button type="button" class="btn btn-outline-primary btn-sm" onclick="addEduEntry('school')">+ Add</button>
              </div>
              <div id="schoolList"></div>
            </div>

            <!-- Intermediate -->
            <div class="mb-3">
              <div class="d-flex align-items-center justify-content-between mb-2">
                <strong style="font-size:13px; color:#4a5568;">&#127979; Intermediate / Higher Secondary (12th)</strong>
                <button type="button" class="btn btn-outline-primary btn-sm" onclick="addEduEntry('intermediate')">+ Add</button>
              </div>
              <div id="intermediateList"></div>
            </div>

            <!-- Degree -->
            <div class="mb-3">
              <div class="d-flex align-items-center justify-content-between mb-2">
                <strong style="font-size:13px; color:#4a5568;">&#127891; Degree / Diploma / PG</strong>
                <button type="button" class="btn btn-outline-primary btn-sm" onclick="addEduEntry('degree')">+ Add</button>
              </div>
              <div id="degreeList"></div>
            </div>
          </div>

          <!-- Work Experience -->
          <div class="profile-section">
            <h5>&#128188; Work Experience</h5>
            <div id="experienceList"></div>
            <button type="button" class="btn btn-outline-primary btn-sm" onclick="addExperience()">+ Add Experience</button>
          </div>

          <!-- Skills -->
          <div class="profile-section">
            <h5>&#9889; Skills & Technologies</h5>
            <div class="col-md-12">
              <input type="text" class="form-control" id="pSkills" placeholder="e.g. JavaScript, Python, React, Node.js (comma separated)">
            </div>
          </div>

          <button type="submit" class="btn btn-primary px-4">Save Profile</button>
          &nbsp;
          <button type="button" class="btn btn-outline-secondary" onclick="loadProfile()">Discard Changes</button>
        </form>
      </div>
    </div>
  </div>

  <script src="/frontend/js/sidebar.js"></script>
  <script>
    let eduCounters = { school: 0, intermediate: 0, degree: 0 };
    let expCount = 0;

    document.addEventListener('DOMContentLoaded', function() {
      const user = checkAuth('Applicant');
      if (!user) return;
      setupNavbar();
      loadProfile();

      document.getElementById('profileForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        await saveProfile();
      });
    });

    /**
     * Add a typed education entry (school | intermediate | degree)
     */
    function addEduEntry(type, data = {}) {
      const containerId = type + 'List';
      const id = type + '-' + (++eduCounters[type]);
      const div = document.createElement('div');
      div.className = 'edu-card';
      div.id = id;

      // Field sets differ slightly by type
      const isSchool = type === 'school';
      const isDegree = type === 'degree';

      div.innerHTML = `
        <button type="button" class="remove-entry" onclick="document.getElementById('${id}').remove()">&#215;</button>
        <div class="row g-2">
          <div class="col-md-4"><input type="text" class="form-control" placeholder="${isDegree ? 'Degree / Diploma' : 'School / College Name'}" data-edu="institution" value="${data.institution||''}"></div>
          ${isDegree ? `<div class="col-md-4"><input type="text" class="form-control" placeholder="Field of Study" data-edu="field" value="${data.field||''}"></div>` : ''}
          <div class="col-md-2"><input type="number" class="form-control" placeholder="From Year" data-edu="fromYear" value="${data.fromYear||''}"></div>
          <div class="col-md-2"><input type="text" class="form-control" placeholder="To Year / Present" data-edu="toYear" value="${data.toYear||''}"></div>
          <div class="col-md-3"><input type="text" class="form-control" placeholder="${isSchool ? 'Board (e.g. CBSE)' : isDegree ? 'University / Board' : 'Board / Stream'}" data-edu="grade" value="${data.grade||''}"></div>
          <div class="col-md-3"><input type="text" class="form-control" placeholder="Score / % / GPA" data-edu="score" value="${data.score||''}"></div>
        </div>
      `;
      document.getElementById(containerId).appendChild(div);
    }

    function addExperience(data = {}) {
      const id = ++expCount;
      const div = document.createElement('div');
      div.className = 'exp-card';
      div.id = `exp-${id}`;
      div.innerHTML = `
        <button type="button" class="remove-entry" onclick="document.getElementById('exp-${id}').remove()">&#215;</button>
        <div class="row g-2">
          <div class="col-md-4"><input type="text" class="form-control" placeholder="Job Title" data-exp="title" value="${data.title||''}"></div>
          <div class="col-md-4"><input type="text" class="form-control" placeholder="Company Name" data-exp="company" value="${data.company||''}"></div>
          <div class="col-md-2"><input type="month" class="form-control" placeholder="From" data-exp="from" value="${data.from||''}"></div>
          <div class="col-md-2"><input type="month" class="form-control" placeholder="To (leave blank if current)" data-exp="to" value="${data.to||''}"></div>
          <div class="col-md-12"><textarea class="form-control" rows="2" placeholder="Key responsibilities and achievements..." data-exp="description">${data.description||''}</textarea></div>
        </div>
      `;
      document.getElementById('experienceList').appendChild(div);
    }

    async function loadProfile() {
      const res = await apiRequest('/applicant/profile');
      if (!res || !res.ok) return;
      const p = await res.json();
      if (!p) return;
      document.getElementById('pFullName').value = p.fullName || '';
      document.getElementById('pAge').value = p.age || '';
      document.getElementById('pDob').value = p.dob ? p.dob.split('T')[0] : '';
      document.getElementById('pPhone').value = p.phone || '';
      document.getElementById('pAddress').value = p.address || '';
      document.getElementById('pLinkedin').value = p.linkedin || '';
      document.getElementById('pGithub').value = p.github || '';
      document.getElementById('pSummary').value = p.summary || '';
      document.getElementById('pSkills').value = (p.skills || []).join(', ');

      // Clear and populate typed education lists
      ['school', 'intermediate', 'degree'].forEach(type => {
        document.getElementById(type + 'List').innerHTML = '';
        eduCounters[type] = 0;
      });
      (p.education || []).forEach(e => {
        const type = e.type || 'degree';
        addEduEntry(type, e);
      });

      document.getElementById('experienceList').innerHTML = '';
      expCount = 0;
      (p.workExperience || []).forEach(e => addExperience(e));
    }

    async function saveProfile() {
      // Collect education from all three sections with type tag
      const education = [];
      ['school', 'intermediate', 'degree'].forEach(type => {
        document.querySelectorAll(`#${type}List [id^="${type}-"]`).forEach(card => {
          education.push({
            type,
            institution: card.querySelector('[data-edu="institution"]')?.value || '',
            field: card.querySelector('[data-edu="field"]')?.value || '',
            fromYear: card.querySelector('[data-edu="fromYear"]')?.value || '',
            toYear: card.querySelector('[data-edu="toYear"]')?.value || '',
            grade: card.querySelector('[data-edu="grade"]')?.value || '',
            score: card.querySelector('[data-edu="score"]')?.value || '',
          });
        });
      });

      const workExperience = [...document.querySelectorAll('[id^="exp-"]')].map(card => ({
        title: card.querySelector('[data-exp="title"]').value,
        company: card.querySelector('[data-exp="company"]').value,
        from: card.querySelector('[data-exp="from"]').value,
        to: card.querySelector('[data-exp="to"]').value,
        description: card.querySelector('[data-exp="description"]').value,
      }));

      const profileData = {
        fullName: document.getElementById('pFullName').value,
        age: parseInt(document.getElementById('pAge').value) || null,
        dob: document.getElementById('pDob').value || null,
        phone: document.getElementById('pPhone').value,
        address: document.getElementById('pAddress').value,
        linkedin: document.getElementById('pLinkedin').value,
        github: document.getElementById('pGithub').value,
        summary: document.getElementById('pSummary').value,
        skills: document.getElementById('pSkills').value.split(',').map(s => s.trim()).filter(Boolean),
        education,
        workExperience
      };

      const res = await apiRequest('/applicant/profile', {
        method: 'PUT',
        body: JSON.stringify(profileData)
      });

      if (res && res.ok) {
        showAlert('Profile saved successfully!', 'success');
      } else {
        showAlert('Failed to save profile. Please try again.', 'error');
      }
    }
  </script>
</body>
</html>
