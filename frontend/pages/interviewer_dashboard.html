<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Interviewer Dashboard - HR Operations Manager">
  <title>Interviewer Dashboard - HR Operations Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/frontend/css/global.css">
  <link rel="stylesheet" href="/frontend/css/dashboard.css">
</head>
<body>
  <div class="layout-wrapper">
    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">
        HR Operations
        <small>Interviewer Panel</small>
      </div>
      <ul class="sidebar-nav">
        <li>
          <a href="#" class="active">
            <span class="nav-icon">&#128227;</span> My Interviews
          </a>
        </li>
        <li class="sidebar-divider"></li>
        <li>
          <a href="#" onclick="logout(); return false;">
            <span class="nav-icon">&#128682;</span> Logout
          </a>
        </li>
      </ul>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Top Navbar -->
      <div class="top-navbar">
        <div class="navbar-left">
          <button class="hamburger-btn" id="hamburgerBtn">&#9776;</button>
          <h1 class="page-title">Interviewer Dashboard</h1>
        </div>
        <div class="navbar-right">
          <button class="notification-bell" id="notifBell">
            &#128276;
            <span class="notification-badge" id="notifBadge" style="display:none">0</span>
          </button>
          <div class="user-info" id="userInfo"></div>
          <button class="btn-logout" id="logoutBtn">Logout</button>
        </div>
      </div>

      <!-- Notification Dropdown -->
      <div class="notification-dropdown" id="notifDropdown">
        <div class="notif-header">Notifications</div>
        <div id="notifList"></div>
      </div>

      <!-- Page Content -->
      <div class="page-content">
        <div id="alertMsg" class="alert-msg"></div>

        <div class="section-header">
          <h2>Assigned Interviews</h2>
        </div>

        <!-- Interviews Table -->
        <div class="table-container">
          <table class="table table-striped table-bordered mb-0">
            <thead class="table-light">
              <tr>
                <th>#</th>
                <th>Candidate Name</th>
                <th>Opportunity</th>
                <th>Date</th>
                <th>Time</th>
                <th>Result</th>
                <th>Actions / Remarks</th>
              </tr>
            </thead>
            <tbody id="interviewsBody">
              <tr><td colspan="7" class="text-center py-3">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Submit Result Modal -->
  <div class="modal-overlay" id="resultModal">
    <div class="modal-box">
      <h3>Submit Interview Result</h3>
      <div class="form-group">
        <label>Result:</label>
        <select id="interviewResult" class="form-control">
          <option value="">-- Select --</option>
          <option value="Pass">Pass</option>
          <option value="Fail">Fail</option>
        </select>
      </div>
      <div class="form-group">
        <label>Remarks / Feedback:</label>
        <textarea id="interviewRemarks" placeholder="Enter your feedback about the candidate..." class="form-control"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal('resultModal')">Cancel</button>
        <button class="btn-submit" onclick="submitInterviewResult()">Submit Result</button>
      </div>
    </div>
  </div>

  <script src="/frontend/js/sidebar.js"></script>
  <script src="/frontend/js/interviewer.js"></script>
</body>
</html>
