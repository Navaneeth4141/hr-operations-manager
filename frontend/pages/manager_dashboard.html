<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Manager Dashboard - HR Operations Manager">
  <title>Manager Dashboard - HR Operations Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/frontend/css/global.css">
  <link rel="stylesheet" href="/frontend/css/dashboard.css">
</head>
<body>
  <div class="layout-wrapper">
    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">
        HR Operations
        <small>Manager Panel</small>
      </div>
      <ul class="sidebar-nav">
        <li>
          <a href="#" class="active">
            <span class="nav-icon">&#128101;</span> Candidates
          </a>
        </li>
        <li class="sidebar-divider"></li>
        <li>
          <a href="#" onclick="logout(); return false;">
            <span class="nav-icon">&#128682;</span> Logout
          </a>
        </li>
      </ul>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Top Navbar -->
      <div class="top-navbar">
        <div class="navbar-left">
          <button class="hamburger-btn" id="hamburgerBtn">&#9776;</button>
          <h1 class="page-title">Manager Dashboard</h1>
        </div>
        <div class="navbar-right">
          <button class="notification-bell" id="notifBell">
            &#128276;
            <span class="notification-badge" id="notifBadge" style="display:none">0</span>
          </button>
          <div class="user-info" id="userInfo"></div>
          <button class="btn-logout" id="logoutBtn">Logout</button>
        </div>
      </div>

      <!-- Notification Dropdown -->
      <div class="notification-dropdown" id="notifDropdown">
        <div class="notif-header">Notifications</div>
        <div id="notifList"></div>
      </div>

      <!-- Page Content -->
      <div class="page-content">
        <div id="alertMsg" class="alert-msg"></div>

        <div class="section-header">
          <h2>Shortlisted Candidates &amp; Interviews</h2>
        </div>

        <!-- Candidates Table -->
        <div class="table-container">
          <table class="table table-striped table-bordered mb-0">
            <thead class="table-light">
              <tr>
                <th>#</th>
                <th>Applicant Name</th>
                <th>Email</th>
                <th>Opportunity</th>
                <th>Status</th>
                <th>Interview Schedule</th>
                <th>Interview Result</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="applicationsBody">
              <tr><td colspan="8" class="text-center py-3">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Schedule Interview Modal -->
  <div class="modal-overlay" id="scheduleModal">
    <div class="modal-box">
      <h3>Schedule Interview</h3>
      <div class="form-group">
        <label>Assign Interviewer:</label>
        <select id="interviewerSelect" class="form-control"></select>
      </div>
      <div class="form-group">
        <label>Interview Date:</label>
        <input type="date" id="interviewDate" class="form-control">
      </div>
      <div class="form-group">
        <label>Interview Time:</label>
        <input type="time" id="interviewTime" class="form-control">
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal('scheduleModal')">Cancel</button>
        <button class="btn-submit" style="background:#38a169" onclick="submitSchedule()">Schedule</button>
      </div>
    </div>
  </div>

  <!-- Decision Reject Modal -->
  <div class="modal-overlay" id="decisionRejectModal">
    <div class="modal-box">
      <h3>Reject After Interview</h3>
      <div class="form-group">
        <label>Reason for Rejection:</label>
        <textarea id="decisionRejectReason" placeholder="Enter reason..." class="form-control"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal('decisionRejectModal')">Cancel</button>
        <button class="btn-submit" style="background:#e53e3e" onclick="submitDecisionReject()">Reject</button>
      </div>
    </div>
  </div>

  <script src="/frontend/js/sidebar.js"></script>
  <script src="/frontend/js/manager.js"></script>
</body>
</html>
