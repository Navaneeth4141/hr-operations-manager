<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Apply for a position - HR Operations Manager">
  <title>Apply - HR Operations Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/frontend/css/global.css">
  <link rel="stylesheet" href="/frontend/css/login.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card" style="max-width:480px">
      <h1>Apply for a Position</h1>
      <p class="subtitle">HR Operations Manager - Application Form</p>

      <form id="applyForm">
        <div class="mb-3">
          <label for="applicantName" class="form-label">Full Name <span style="color:red">*</span></label>
          <input type="text" class="form-control" id="applicantName" 
                 placeholder="Enter your full name" required>
        </div>

        <div class="mb-3">
          <label for="applicantEmail" class="form-label">Email Address <span style="color:red">*</span></label>
          <input type="email" class="form-control" id="applicantEmail" 
                 placeholder="your.email@example.com" required>
        </div>

        <div class="mb-3">
          <label for="opportunityId" class="form-label">Position / Opportunity <span style="color:red">*</span></label>
          <select class="form-control" id="opportunityId" required>
            <option value="">-- Select an Opportunity --</option>
            <!-- Options loaded by JS -->
          </select>
        </div>

        <div class="mb-3">
          <label for="resume" class="form-label">Resume (PDF, DOC, DOCX)</label>
          <input type="file" class="form-control" id="resume" 
                 accept=".pdf,.doc,.docx,.txt">
          <small class="text-muted" style="font-size:11px">Max file size: 5MB</small>
        </div>

        <button type="submit" class="btn btn-primary">Submit Application</button>
      </form>

      <!-- Success/Error Message -->
      <div id="applyMsg" class="alert mt-3" style="display:none"></div>

      <div class="login-footer" style="margin-top:20px">
        <p>Already applied? <a href="/frontend/pages/login.html">Login to track status</a></p>
      </div>
    </div>
  </div>

  <script src="/frontend/js/apply.js"></script>
</body>
</html>
