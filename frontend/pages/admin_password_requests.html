<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Admin Dashboard - HR Operations Manager">
  <title>Admin Dashboard - HR Operations Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/frontend/css/global.css">
  <link rel="stylesheet" href="/frontend/css/dashboard.css">
  <link rel="stylesheet" href="/frontend/css/reports.css">
</head>
<body>
  <div class="layout-wrapper">
    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">
        HR Operations
        <small>Admin Panel</small>
      </div>
      <ul class="sidebar-nav">
        <li>
          <a href="/admin-dashboard">
            <span class="nav-icon">&#128202;</span> Dashboard
          </a>
        </li>
        <li>
          <a href="/admin-password-requests" class="active">
            <span class="nav-icon">&#128274;</span> Password Requests
          </a>
        </li>
        <li class="sidebar-divider"></li>
        <li>
          <a href="#" onclick="logout(); return false;">
            <span class="nav-icon">&#128682;</span> Logout
          </a>
        </li>
      </ul>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Top Navbar -->
      <div class="top-navbar">
        <div class="navbar-left">
          <button class="hamburger-btn" id="hamburgerBtn">&#9776;</button>
          <h1 class="page-title">Company Password Requests</h1>
        </div>
        <div class="navbar-right">
          <button class="notification-bell" id="notifBell">
            &#128276;
            <span class="notification-badge" id="notifBadge" style="display:none">0</span>
          </button>
          <div class="user-info" id="userInfo"></div>
          <button class="btn-logout" id="logoutBtn">Logout</button>
        </div>
      </div>

      <!-- Notification Dropdown -->
      <div class="notification-dropdown" id="notifDropdown">
        <div class="notif-header">Notifications</div>
        <div id="notifList"></div>
      </div>

      <!-- Page Content -->
      <div class="page-content">
        <div id="alertMsg" class="alert-msg"></div>



        <!-- Company Password Requests -->
        <div class="section-header" style="margin-top:20px">
          <h2>Company Password Requests</h2>
        </div>
        <div class="card p-3 mb-4">
          <table class="table table-striped table-bordered mb-0">
            <thead class="table-light">
              <tr>
                <th>Company</th>
                <th>HR Username</th>
                <th>HR Email</th>
                <th>Requested At</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="passwordRequestsBody">
              <tr><td colspan="5" class="text-center py-3">Loading requests...</td></tr>
            </tbody>
          </table>
        </div>


      </div>
    </div>
  </div>

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <!-- SheetJS CDN for Excel export -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="/frontend/js/sidebar.js"></script>
  <script src="/frontend/js/admin.js"></script>
</body>
</html>
